<!DOCTYPE html>
<html>
<head>
    <title>Card Page</title>
    <style>
body {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    background-color: #f0f0f0;
    font-family: Arial, sans-serif;
}

.card {
    width: 320px;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    background-color: white;
}

.card-header {
    background-color: #5b7fa6;
    padding: 16px;
    color: white;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.card-header h2 {
    margin: 0;
    font-size: 18px;
    text-decoration: underline;
}

.card-header p {
    margin: 4px 0 0;
    font-size: 14px;
}

.avatar {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background-color: #ccc;
    overflow: hidden;
}

.avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.card-body {
    padding: 16px;
}

.card-body p {
    margin: 0;
    font-size: 14px;
    color: #333;
}

.card-body strong {
    display: block;
    margin-bottom: 4px;
}

.card-footer {
    display: flex;
    justify-content: space-around;
    padding: 12px;
    border-top: 1px solid #eee;
}

.card-footer button {
    background: none;
    border: none;
    font-size: 22px;
    cursor: pointer;
    padding: 8px 16px;
    border-radius: 8px;
    transition: background 0.2s;
}

.card-footer button:hover {
    background-color: #f0f0f0;
}
    </style>
</head>
<body>

<div class="card">
    <!-- Header -->
    <div class="card-header">
        <div>
            <h2>2569/1 Com Tech for Edu</h2>
            <p>Kornchawal Chaipah</p>
        </div>
        <div class="avatar">
            <img src="https://via.placeholder.com/60" alt="avatar">
        </div>
    </div>

    <!-- Body -->
    <div class="card-body">
        <p><strong>Due Sunday</strong>
        11:59 PM – Lab 1 ESP32, GPIO Basics, DHT11 Sensors</p>
    </div>

    <!-- Footer Buttons -->
    <div class="card-footer">
        <button title="Profile">👤</button>
        <button title="Folder">📁</button>
        <button title="More">⋮</button>
    </div>
</div>

</body>
</html>
